<svg viewBox="0 0 900 580" xmlns="http://www.w3.org/2000/svg" style="background:#0f1214;">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1B7F79" opacity="0.8"/>
    </marker>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#555" opacity="0.8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="580" fill="#0f1214"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-family="'Arial Black', sans-serif" font-size="14" fill="#1B7F79" letter-spacing="5">EZRA — SYSTEM ARCHITECTURE</text>
  <line x1="150" y1="48" x2="750" y2="48" stroke="#1B7F79" stroke-width="0.5" opacity="0.4"/>

  <!-- ===== USER layer ===== -->
  <text x="50" y="95" font-family="'Courier New', monospace" font-size="9" fill="#555" letter-spacing="2">USER INTERFACE</text>

  <!-- Voice input node -->
  <rect x="50" y="105" width="110" height="50" rx="6" fill="#1a2020" stroke="#1B7F79" stroke-width="1"/>
  <text x="105" y="127" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#1B7F79">VOICE</text>
  <text x="105" y="143" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#555">Whisper ASR</text>

  <!-- Haptic output node -->
  <rect x="50" y="175" width="110" height="50" rx="6" fill="#1a1520" stroke="#c080ff" stroke-width="1"/>
  <text x="105" y="197" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#c080ff">HAPTIC</text>
  <text x="105" y="213" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#555">LRA · DRV2605L</text>

  <!-- Thermal node -->
  <rect x="50" y="245" width="110" height="50" rx="6" fill="#201510" stroke="#e08060" stroke-width="1"/>
  <text x="105" y="267" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#e08060">WARMTH</text>
  <text x="105" y="283" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#555">Peltier TEC</text>

  <!-- Light node -->
  <rect x="50" y="315" width="110" height="50" rx="6" fill="#1a1a10" stroke="#d4a820" stroke-width="1"/>
  <text x="105" y="337" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#d4a820">LIGHT</text>
  <text x="105" y="353" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#555">COB · SK6812</text>

  <!-- ===== CORE — ZeroMQ bus ===== -->
  <text x="280" y="95" font-family="'Courier New', monospace" font-size="9" fill="#555" letter-spacing="2">CORE BUS</text>

  <rect x="240" y="105" width="140" height="270" rx="8" fill="#141820" stroke="#333" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="310" y="245" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#333" transform="rotate(-90,310,245)">ZeroMQ MESSAGE BUS</text>

  <!-- ===== SERVICES layer ===== -->
  <text x="460" y="95" font-family="'Courier New', monospace" font-size="9" fill="#555" letter-spacing="2">SERVICES</text>

  <!-- Voice Pipeline -->
  <rect x="420" y="105" width="140" height="55" rx="6" fill="#151f1f" stroke="#1B7F79" stroke-width="1.5"/>
  <text x="490" y="126" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#1B7F79">VOICE PIPELINE</text>
  <text x="490" y="142" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#555">Wake → ASR → LLM → TTS</text>
  <text x="490" y="153" text-anchor="middle" font-family="'Courier New', monospace" font-size="7" fill="#444">Claude API · Whisper · Coqui</text>

  <!-- Identity Service -->
  <rect x="420" y="175" width="140" height="55" rx="6" fill="#151520" stroke="#4a8aff" stroke-width="1.5"/>
  <text x="490" y="196" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#4a8aff">IDENTITY SERVICE</text>
  <text x="490" y="212" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#555">PPG Auth · FIDO2</text>
  <text x="490" y="223" text-anchor="middle" font-family="'Courier New', monospace" font-size="7" fill="#444">MAX30102 · SLB9670 TPM</text>

  <!-- Haptic Service -->
  <rect x="420" y="245" width="140" height="45" rx="6" fill="#1a1525" stroke="#c080ff" stroke-width="1"/>
  <text x="490" y="265" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#c080ff">HAPTIC SERVICE</text>
  <text x="490" y="281" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#555">Pattern queue · Priority</text>

  <!-- Thermal Service -->
  <rect x="420" y="305" width="140" height="40" rx="6" fill="#201510" stroke="#e08060" stroke-width="1"/>
  <text x="490" y="323" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#e08060">THERMAL SERVICE</text>
  <text x="490" y="337" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#555">PWM · Safety limits</text>

  <!-- Light Service -->
  <rect x="420" y="360" width="140" height="40" rx="6" fill="#1a1a10" stroke="#d4a820" stroke-width="1"/>
  <text x="490" y="378" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#d4a820">LIGHT SERVICE</text>
  <text x="490" y="393" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#555">rpi-ws281x · PWM</text>

  <!-- ===== INTELLIGENCE layer ===== -->
  <text x="660" y="95" font-family="'Courier New', monospace" font-size="9" fill="#555" letter-spacing="2">INTELLIGENCE</text>

  <!-- Minion Context -->
  <rect x="630" y="105" width="150" height="65" rx="6" fill="#151520" stroke="#1B7F79" stroke-width="1.5"/>
  <text x="705" y="126" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#1B7F79">MINION CONTEXT</text>
  <text x="705" y="142" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#555">Persistent AI identity</text>
  <text x="705" y="156" text-anchor="middle" font-family="'Courier New', monospace" font-size="7" fill="#444">Memory · Contacts · Health</text>

  <!-- Claude API -->
  <rect x="630" y="190" width="150" height="55" rx="6" fill="#151a15" stroke="#88bb88" stroke-width="1"/>
  <text x="705" y="211" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#88bb88">CLAUDE API</text>
  <text x="705" y="227" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#555">LLM reasoning · context</text>
  <text x="705" y="238" text-anchor="middle" font-family="'Courier New', monospace" font-size="7" fill="#444">claude-sonnet · offline fallback</text>

  <!-- Cellular Manager -->
  <rect x="630" y="265" width="150" height="55" rx="6" fill="#1a1515" stroke="#aa6060" stroke-width="1"/>
  <text x="705" y="286" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#aa6060">CELLULAR MANAGER</text>
  <text x="705" y="302" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#555">LTE · SIP · SMS</text>
  <text x="705" y="313" text-anchor="middle" font-family="'Courier New', monospace" font-size="7" fill="#444">Quectel EC25 · pjsua2</text>

  <!-- ===== ARROWS — User to Bus ===== -->
  <!-- Voice → Bus -->
  <line x1="162" y1="130" x2="238" y2="160" stroke="#1B7F79" stroke-width="1" marker-end="url(#arrow)" opacity="0.6"/>
  <!-- Bus → Haptic -->
  <line x1="238" y1="220" x2="162" y2="205" stroke="#c080ff" stroke-width="1" marker-end="url(#arrowGray)" opacity="0.5"/>
  <!-- Bus → Thermal -->
  <line x1="238" y1="270" x2="162" y2="270" stroke="#e08060" stroke-width="1" marker-end="url(#arrowGray)" opacity="0.5"/>
  <!-- Bus → Light -->
  <line x1="238" y1="310" x2="162" y2="340" stroke="#d4a820" stroke-width="1" marker-end="url(#arrowGray)" opacity="0.5"/>

  <!-- ===== ARROWS — Bus to Services ===== -->
  <line x1="382" y1="150" x2="418" y2="135" stroke="#1B7F79" stroke-width="1" marker-end="url(#arrow)" opacity="0.6"/>
  <line x1="382" y1="200" x2="418" y2="200" stroke="#4a8aff" stroke-width="1" marker-end="url(#arrow)" opacity="0.6"/>
  <line x1="382" y1="248" x2="418" y2="268" stroke="#c080ff" stroke-width="1" marker-end="url(#arrow)" opacity="0.5"/>
  <line x1="382" y1="290" x2="418" y2="322" stroke="#e08060" stroke-width="1" marker-end="url(#arrow)" opacity="0.5"/>
  <line x1="382" y1="330" x2="418" y2="375" stroke="#d4a820" stroke-width="1" marker-end="url(#arrow)" opacity="0.5"/>

  <!-- ===== ARROWS — Services to Intelligence ===== -->
  <line x1="562" y1="140" x2="628" y2="140" stroke="#1B7F79" stroke-width="1.2" marker-end="url(#arrow)" opacity="0.7"/>
  <line x1="562" y1="160" x2="628" y2="215" stroke="#88bb88" stroke-width="1" marker-end="url(#arrow)" opacity="0.5"/>
  <line x1="562" y1="200" x2="628" y2="200" stroke="#4a8aff" stroke-width="1" marker-end="url(#arrow)" opacity="0.5"/>
  <line x1="562" y1="290" x2="628" y2="290" stroke="#aa6060" stroke-width="1" marker-end="url(#arrow)" opacity="0.5"/>

  <!-- ===== SECURITY NOTE ===== -->
  <rect x="50" y="430" width="780" height="80" rx="8" fill="#0d1a0d" stroke="#1B7F79" stroke-width="0.5" opacity="0.8"/>
  <text x="70" y="452" font-family="'Courier New', monospace" font-size="9" fill="#1B7F79" letter-spacing="2">PRIVACY ARCHITECTURE</text>
  <text x="70" y="470" font-family="'Courier New', monospace" font-size="9" fill="#666">· Biometric templates stored in TPM only — never transmitted</text>
  <text x="70" y="485" font-family="'Courier New', monospace" font-size="9" fill="#666">· Core functions (calls, auth, haptic, nav) operate offline</text>
  <text x="70" y="500" font-family="'Courier New', monospace" font-size="9" fill="#666">· No browser · No app store · No advertising SDK · No feed</text>
  <text x="450" y="470" font-family="'Courier New', monospace" font-size="9" fill="#666">· FIDO2 passkey auth for all connected services</text>
  <text x="450" y="485" font-family="'Courier New', monospace" font-size="9" fill="#666">· E2E encryption on all messages (Signal protocol)</text>
  <text x="450" y="500" font-family="'Courier New', monospace" font-size="9" fill="#666">· User owns all data · Full export at any time</text>

  <!-- Footer -->
  <text x="450" y="545" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#333" letter-spacing="2">GOOD INDUSTRIES · EZRA v0.3 · APRIL 2026</text>
</svg>
