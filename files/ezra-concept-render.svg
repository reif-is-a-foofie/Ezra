<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" style="background:#0d0d0d;">
  <defs>
    <!-- Stone gradient - mineral KRION surface -->
    <radialGradient id="stoneGrad" cx="42%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#f5f2ed"/>
      <stop offset="35%" stop-color="#e8e4de"/>
      <stop offset="70%" stop-color="#d4cfc8"/>
      <stop offset="100%" stop-color="#b8b3ab"/>
    </radialGradient>
    <!-- Stone edge shadow -->
    <radialGradient id="shadowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="60%" stop-color="#0d0d0d" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.7"/>
    </radialGradient>
    <!-- Sensor window gradient -->
    <radialGradient id="sensorGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#2a4a6a"/>
      <stop offset="50%" stop-color="#0d1f35"/>
      <stop offset="100%" stop-color="#050e1a"/>
    </radialGradient>
    <!-- Sapphire window glow -->
    <radialGradient id="sapphireGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4a8aff" stop-opacity="0.6"/>
      <stop offset="70%" stop-color="#1a4aaa" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0a1a55" stop-opacity="0"/>
    </radialGradient>
    <!-- Ambient LED glow -->
    <radialGradient id="amberGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffb830" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ff8800" stop-opacity="0"/>
    </radialGradient>
    <!-- Drop shadow filter -->
    <filter id="dropShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="18"/>
      <feOffset dx="0" dy="12"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.6"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Subtle texture filter -->
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="overlay" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>
    <!-- Stone body clip path -->
    <clipPath id="stoneClip">
      <rect x="260" y="120" width="280" height="360" rx="60" ry="60"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#0d0d0d"/>

  <!-- Subtle background gradient -->
  <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#1a1a1a"/>
    <stop offset="100%" stop-color="#0d0d0d"/>
  </radialGradient>
  <rect width="800" height="600" fill="url(#bgGrad)"/>

  <!-- Stone body with drop shadow -->
  <g filter="url(#dropShadow)">
    <!-- Main stone body -->
    <rect x="260" y="120" width="280" height="360" rx="60" ry="60" fill="url(#stoneGrad)"/>
    <!-- Mineral texture overlay -->
    <rect x="260" y="120" width="280" height="360" rx="60" ry="60" fill="url(#stoneGrad)" filter="url(#grain)" opacity="0.3"/>
    <!-- Edge vignette for depth -->
    <rect x="260" y="120" width="280" height="360" rx="60" ry="60" fill="url(#shadowGrad)"/>
  </g>

  <!-- Subtle grip indent lines (bilateral grip geometry) -->
  <g opacity="0.12">
    <path d="M260,260 Q240,300 260,340" stroke="#5a5550" stroke-width="1" fill="none"/>
    <path d="M540,260 Q560,300 540,340" stroke="#5a5550" stroke-width="1" fill="none"/>
  </g>

  <!-- Highlight - top left light catch -->
  <ellipse cx="330" cy="175" rx="60" ry="25" fill="white" opacity="0.18" transform="rotate(-15,330,175)"/>

  <!-- PPG Sensor window — sapphire disc, lower center -->
  <!-- Recess depression -->
  <ellipse cx="400" cy="420" rx="22" ry="22" fill="#b0aba3"/>
  <!-- Sapphire window -->
  <ellipse cx="400" cy="420" rx="18" ry="18" fill="url(#sensorGrad)"/>
  <!-- Sapphire surface reflection -->
  <ellipse cx="394" cy="414" rx="6" ry="4" fill="white" opacity="0.25" transform="rotate(-30,394,414)"/>
  <!-- Active PPG glow -->
  <ellipse cx="400" cy="420" rx="18" ry="18" fill="url(#sapphireGlow)"/>
  <!-- Window rim -->
  <ellipse cx="400" cy="420" rx="18" ry="18" fill="none" stroke="#9a9590" stroke-width="1.5"/>
  <!-- Red LED active indicator -->
  <ellipse cx="396" cy="418" rx="3" ry="3" fill="#ff2200" opacity="0.7"/>
  <!-- IR LED (invisible but show position) -->
  <ellipse cx="404" cy="422" rx="2.5" ry="2.5" fill="#444" opacity="0.5"/>

  <!-- Ambient LED ring glow — teal/amber -->
  <!-- Perimeter ambient LED suggestion -->
  <rect x="262" y="122" width="276" height="356" rx="59" ry="59" fill="none" stroke="#d4a820" stroke-width="1.5" opacity="0.35"/>
  <!-- Corner glow nodes -->
  <circle cx="310" cy="148" r="4" fill="#ffb830" opacity="0.5"/>
  <circle cx="490" cy="148" r="4" fill="#ffb830" opacity="0.5"/>
  <circle cx="310" cy="452" r="4" fill="#ffb830" opacity="0.5"/>
  <circle cx="490" cy="452" r="4" fill="#ffb830" opacity="0.5"/>

  <!-- Speaker aperture — upper center -->
  <!-- Fine mesh pattern -->
  <g opacity="0.55">
    <line x1="378" y1="185" x2="422" y2="185" stroke="#888" stroke-width="0.8"/>
    <line x1="376" y1="190" x2="424" y2="190" stroke="#888" stroke-width="0.8"/>
    <line x1="375" y1="195" x2="425" y2="195" stroke="#888" stroke-width="0.8"/>
    <line x1="374" y1="200" x2="426" y2="200" stroke="#888" stroke-width="0.8"/>
    <line x1="375" y1="205" x2="425" y2="205" stroke="#888" stroke-width="0.8"/>
    <line x1="376" y1="210" x2="424" y2="210" stroke="#888" stroke-width="0.8"/>
    <line x1="378" y1="215" x2="422" y2="215" stroke="#888" stroke-width="0.8"/>
    <!-- Vertical mesh lines -->
    <line x1="385" y1="185" x2="385" y2="215" stroke="#888" stroke-width="0.6"/>
    <line x1="393" y1="184" x2="393" y2="216" stroke="#888" stroke-width="0.6"/>
    <line x1="400" y1="184" x2="400" y2="216" stroke="#888" stroke-width="0.6"/>
    <line x1="407" y1="184" x2="407" y2="216" stroke="#888" stroke-width="0.6"/>
    <line x1="415" y1="185" x2="415" y2="215" stroke="#888" stroke-width="0.6"/>
  </g>
  <!-- Speaker aperture mask -->
  <ellipse cx="400" cy="200" rx="28" ry="18" fill="none" stroke="#ccc" stroke-width="0.5" opacity="0.3"/>

  <!-- USB-C port — bottom edge center -->
  <rect x="390" y="474" width="20" height="6" rx="3" fill="#888" opacity="0.6"/>
  <rect x="392" y="475" width="16" height="4" rx="2" fill="#555"/>

  <!-- COB LED array / torch aperture suggestion — upper back (shown as subtle oval) -->
  <ellipse cx="400" cy="155" rx="8" ry="4" fill="#f8f8f0" opacity="0.4"/>

  <!-- ====== CALLOUT LABELS ====== -->
  <!-- Left side callouts -->

  <!-- PPG / Sapphire window callout -->
  <line x1="378" y1="420" x2="230" y2="420" stroke="#4a8aff" stroke-width="1" stroke-dasharray="4,3" opacity="0.7"/>
  <circle cx="228" cy="420" r="3" fill="#4a8aff" opacity="0.8"/>
  <text x="220" y="416" text-anchor="end" font-family="'Courier New', monospace" font-size="11" fill="#4a8aff" opacity="0.9">PPG Sensor</text>
  <text x="220" y="430" text-anchor="end" font-family="'Courier New', monospace" font-size="9" fill="#4a8aff" opacity="0.6">Sapphire window · MAX30102</text>

  <!-- Speaker callout -->
  <line x1="372" y1="200" x2="230" y2="200" stroke="#a0c0a0" stroke-width="1" stroke-dasharray="4,3" opacity="0.7"/>
  <circle cx="228" cy="200" r="3" fill="#a0c0a0" opacity="0.8"/>
  <text x="220" y="196" text-anchor="end" font-family="'Courier New', monospace" font-size="11" fill="#a0c0a0" opacity="0.9">Speaker Array</text>
  <text x="220" y="210" text-anchor="end" font-family="'Courier New', monospace" font-size="9" fill="#a0c0a0" opacity="0.6">2W · beamform mic array</text>

  <!-- Peltier callout -->
  <line x1="376" y1="460" x2="230" y2="460" stroke="#e08060" stroke-width="1" stroke-dasharray="4,3" opacity="0.7"/>
  <circle cx="228" cy="460" r="3" fill="#e08060" opacity="0.8"/>
  <text x="220" y="456" text-anchor="end" font-family="'Courier New', monospace" font-size="11" fill="#e08060" opacity="0.9">Thermal Zone</text>
  <text x="220" y="470" text-anchor="end" font-family="'Courier New', monospace" font-size="9" fill="#e08060" opacity="0.6">Peltier TEC · warmth notification</text>

  <!-- Right side callouts -->

  <!-- Ambient LED callout -->
  <line x1="542" y1="148" x2="590" y2="148" stroke="#d4a820" stroke-width="1" stroke-dasharray="4,3" opacity="0.7"/>
  <circle cx="592" cy="148" r="3" fill="#d4a820" opacity="0.8"/>
  <text x="600" y="144" text-anchor="start" font-family="'Courier New', monospace" font-size="11" fill="#d4a820" opacity="0.9">Ambient LED Ring</text>
  <text x="600" y="158" text-anchor="start" font-family="'Courier New', monospace" font-size="9" fill="#d4a820" opacity="0.6">SK6812 RGBW · notification language</text>

  <!-- LRA Haptic callout -->
  <line x1="542" y1="300" x2="590" y2="300" stroke="#c080ff" stroke-width="1" stroke-dasharray="4,3" opacity="0.7"/>
  <circle cx="592" cy="300" r="3" fill="#c080ff" opacity="0.8"/>
  <text x="600" y="296" text-anchor="start" font-family="'Courier New', monospace" font-size="11" fill="#c080ff" opacity="0.9">LRA Haptic</text>
  <text x="600" y="310" text-anchor="start" font-family="'Courier New', monospace" font-size="9" fill="#c080ff" opacity="0.6">Lofelt L5 · DRV2605L · 50–300Hz</text>

  <!-- KRION material callout -->
  <line x1="542" y1="380" x2="590" y2="380" stroke="#d0ccc8" stroke-width="1" stroke-dasharray="4,3" opacity="0.7"/>
  <circle cx="592" cy="380" r="3" fill="#d0ccc8" opacity="0.8"/>
  <text x="600" y="376" text-anchor="start" font-family="'Courier New', monospace" font-size="11" fill="#d0ccc8" opacity="0.9">KRION Mineral Body</text>
  <text x="600" y="390" text-anchor="start" font-family="'Courier New', monospace" font-size="9" fill="#d0ccc8" opacity="0.6">Mineral solid surface · 200g</text>

  <!-- Title block -->
  <text x="400" y="555" text-anchor="middle" font-family="'Arial Black', sans-serif" font-size="22" font-weight="900" fill="white" letter-spacing="8">EZRA</text>
  <text x="400" y="572" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#666" letter-spacing="3">SCREENLESS AI COMPANION · GOOD INDUSTRIES</text>

  <!-- Subtle teal accent line -->
  <line x1="320" y1="543" x2="480" y2="543" stroke="#1B7F79" stroke-width="1" opacity="0.6"/>
</svg>
